<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product details — Reclaimed Group auto detailing supply.">
  <title>Product | Reclaimed Group</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header id="nav" role="banner"></header>

  <!-- ═══ PRODUCT DETAIL ════════════════════════════════════════ -->
  <main class="product-detail" id="product-main">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span class="bc-sep" aria-hidden="true">›</span>
        <a href="shop.html">Shop</a>
        <span class="bc-sep" aria-hidden="true">›</span>
        <span id="bc-name" aria-current="page">Product</span>
      </nav>

      <div class="product-detail-grid" style="margin-top:32px">

        <!-- Left: Image -->
        <div>
          <div class="product-detail-img" id="detail-main-img" aria-label="Product image"></div>
          <div class="detail-thumbs" id="detail-thumbs" aria-label="Product views"></div>
        </div>

        <!-- Right: Info -->
        <div class="product-detail-info">
          <div class="product-detail-cat" id="detail-cat"></div>
          <h1 class="product-detail-name" id="detail-name"></h1>
          <p class="product-detail-sub" id="detail-sub"></p>
          <div class="product-detail-price" id="detail-price"></div>

          <p style="font-size:.9rem;color:var(--text-2);line-height:1.75;margin-bottom:20px" id="detail-desc"></p>

          <div class="divider" style="margin:20px 0"></div>

          <p style="font-size:.72rem;font-family:var(--font-h);letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">What's Included / Features</p>
          <ul class="feature-list" id="detail-features"></ul>

          <div class="divider" style="margin:20px 0"></div>

          <!-- Quantity + Add to Cart -->
          <div style="margin-bottom:16px">
            <label for="detail-qty" style="font-family:var(--font-h);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);display:block;margin-bottom:8px">Quantity</label>
            <div class="qty-control">
              <button class="qty-ctrl-btn" id="qty-down" aria-label="Decrease quantity">−</button>
              <input class="qty-ctrl-input" type="number" id="detail-qty" value="1" min="1" max="20" aria-label="Quantity">
              <button class="qty-ctrl-btn" id="qty-up" aria-label="Increase quantity">+</button>
            </div>
          </div>

          <div class="detail-actions">
            <button class="btn btn-primary" id="add-to-cart-btn" style="flex:1">
              + Add to Cart
            </button>
            <a href="contact.html" class="btn btn-outline">Inquire About This</a>
          </div>

          <div style="margin-top:16px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;gap:10px;align-items:flex-start">
            <span style="color:var(--gold);font-size:1rem;flex-shrink:0">ℹ</span>
            <p style="font-size:.78rem;color:var(--text-3);line-height:1.6">
              We don't process payments online. After adding to cart and clicking
              <em>Contact to Order</em>, we'll reach out within 24 hours to confirm your order and arrange payment.
            </p>
          </div>
        </div>

      </div>

      <!-- ─── Related Products ─── -->
      <div class="divider"></div>
      <div class="section-header" style="margin-bottom:28px">
        <div class="eyebrow">You Might Also Like</div>
        <h2>Related Products</h2>
      </div>
      <div class="product-grid" id="related-products"></div>
    </div>
  </main>

  <footer id="footer" role="contentinfo"></footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params  = new URLSearchParams(window.location.search);
      const product = getProductById(params.get('id'));

      if (!product) {
        document.getElementById('product-main').innerHTML = `
          <div class="container" style="text-align:center;padding:80px 0">
            <h2>Product not found</h2>
            <a href="shop.html" class="btn btn-primary" style="margin-top:24px">Back to Shop</a>
          </div>
        `;
        return;
      }

      // Meta
      document.title = `${product.name} | Reclaimed Group`;
      document.querySelector('meta[name="description"]').content = product.desc;

      // Breadcrumb
      document.getElementById('bc-name').textContent = product.name;

      // Main image
      document.getElementById('detail-main-img').innerHTML = `
        <div style="width:100%;height:100%;background:${product.gradient};display:flex;align-items:center;justify-content:center;font-size:8rem" aria-hidden="true">
          ${product.icon}
        </div>
      `;

      // Thumbnails (4 colour variations)
      const thumbGradients = [
        product.gradient,
        product.gradient.replace('135deg', '45deg'),
        product.gradient.replace('135deg', '225deg'),
        product.gradient.replace('135deg', '315deg'),
      ];
      document.getElementById('detail-thumbs').innerHTML = thumbGradients.map((g, i) => `
        <div class="detail-thumb ${i === 0 ? 'active' : ''}" aria-label="View ${i + 1}">
          <div style="width:100%;height:100%;background:${g};display:flex;align-items:center;justify-content:center;font-size:1.8rem" aria-hidden="true">${product.icon}</div>
        </div>
      `).join('');

      // Info
      document.getElementById('detail-cat').textContent   = product.category;
      document.getElementById('detail-name').textContent  = product.name;
      document.getElementById('detail-sub').textContent   = product.subtitle;
      document.getElementById('detail-price').textContent = '$' + product.price.toFixed(2);
      document.getElementById('detail-desc').textContent  = product.desc;

      document.getElementById('detail-features').innerHTML = product.features.map(f => `
        <li>
          <span class="check-icon" aria-hidden="true">✓</span>
          <span>${f}</span>
        </li>
      `).join('');

      // Quantity controls
      const qtyInput = document.getElementById('detail-qty');
      document.getElementById('qty-down').addEventListener('click', () => {
        qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1);
      });
      document.getElementById('qty-up').addEventListener('click', () => {
        qtyInput.value = Math.min(20, parseInt(qtyInput.value) + 1);
      });

      // Add to cart
      document.getElementById('add-to-cart-btn').addEventListener('click', () => {
        const qty = Math.max(1, parseInt(qtyInput.value) || 1);
        cart.add(product, qty);
        _updateCartCount && _updateCartCount();
        showToast(`${product.name} (×${qty}) added to cart ✓`);
      });

      // Related
      const related = PRODUCTS
        .filter(p => p.id !== product.id && (p.category === product.category || p.badge))
        .slice(0, 4);
      document.getElementById('related-products').innerHTML = related.map(p => productCard(p)).join('');
    });
  </script>
</body>
</html>
